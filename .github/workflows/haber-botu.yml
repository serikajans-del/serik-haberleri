name: Haber Botu

on:
  schedule:
    # Her 3 saatte bir çalışır (UTC saati — Türkiye UTC+3)
    # 00:00, 03:00, 06:00, 09:00, 12:00, 15:00, 18:00, 21:00 TR saati
    - cron: "0 21,0,3,6,9,12,15,18 * * *"
  workflow_dispatch: # Manuel tetikleme (GitHub'dan elle çalıştırma)

jobs:
  haber-cek:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Kodu al
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: bot/package.json

      - name: Bağımlılıkları yükle
        working-directory: bot
        run: npm install

      - name: Haber botunu çalıştır
        working-directory: bot
        env:
          NEXT_PUBLIC_SUPABASE_URL:   ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY:  ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY:          ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY:        ${{ secrets.UNSPLASH_ACCESS_KEY }}
          TWITTER_API_KEY:            ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET:         ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN:       ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: node auto-haber.mjs
