name: Serik Haber Botu

on:
  schedule:
    # Her 3 saatte bir çalışır (UTC saatiyle)
    - cron: '0 */3 * * *'
  # Manuel çalıştırma için
  workflow_dispatch:

jobs:
  haber-ekle:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: bot/package-lock.json

      - name: Bot bağımlılıklarını yükle
        run: |
          cd bot
          npm install

      - name: Haber botunu çalıştır
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          cd bot
          node auto-haber.mjs

      - name: Sonuç
        run: echo "✅ Bot tamamlandı — $(date '+%d.%m.%Y %H:%M')"
